<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROBOOTH | Premium buratt Experience</title>
    <style>
        :root {
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.5);
            --bg-dark: #2e3444;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --transition-soft: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevent body scroll to keep 90vh feel */
            padding: 1rem;
        }

        /* UI Shell - Adjusted to 90% Height */
        .glass-shell {
            width: 100%;
            max-width: 1100px;
            height: 90vh; /* Requirement 1 */
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2rem;
            transition: var(--transition-soft);
            overflow-y: auto; /* Ensure content is reachable if it overflows the 90vh */
        }

        @media (max-width: 900px) {
            .glass-shell { 
                grid-template-columns: 1fr; 
                padding: 1.25rem;
                height: 95vh; /* Slightly taller on mobile for better fit */
            }
            .side-panel { order: 2; }
            .preview-panel { order: 1; }
        }

        .icon { width: 20px; height: 20px; fill: currentColor; vertical-align: middle; }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 0.1em; }

        .preview-panel {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 4/3;
            box-shadow: 0 0 0 1px var(--glass-border);
            align-self: center;
        }

        #v-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-soft);
        }

        .mirrored { transform: scaleX(-1); }

        #count-num {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10rem;
            font-weight: 900;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .flash-fx {
            position: absolute;
            inset: 0;
            background: #fff;
            opacity: 0;
            z-index: 11;
            pointer-events: none;
        }

        .side-panel { display: flex; flex-direction: column; gap: 1.2rem; }
        .control-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-size: 0.75rem; font-weight: 600; color: var(--text-dim); }

        select, input[type="text"], input[type="color"] {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 10px 14px;
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition-soft);
        }

        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }
        .btn-secondary { background: var(--glass); color: white; border: 1px solid var(--glass-border); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .capture-btn { margin-top: auto; padding: 18px; font-size: 1.1rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

        /* Result View & Stickers */
        #result-view {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .canvas-container {
            position: relative;
            max-width: 90%;
            max-height: 65vh;
            margin-bottom: 1.5rem;
            touch-action: none; /* Required for sticker dragging */
        }

        #final-canvas {
            max-width: 100%;
            max-height: 65vh;
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            display: block;
        }

        .sticker-panel {
            display: flex;
            gap: 10px;
            background: var(--glass);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            max-width: 100%;
            overflow-x: auto;
            border: 1px solid var(--glass-border);
        }

        .sticker-opt {
            font-size: 2rem;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.2s;
            user-select: none;
        }

        .sticker-opt:hover { transform: scale(1.2); }

        .active-sticker {
            position: absolute;
            cursor: move;
            user-select: none;
            touch-action: none;
            font-size: 60px; /* Default size */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .sticker-controls {
            position: absolute;
            top: -20px;
            right: -20px;
            display: flex;
            gap: 5px;
            background: #fff;
            border-radius: 20px;
            padding: 2px;
            display: none; /* Only show when selected */
        }

        .count-animate { animation: countPop 1s ease-out; }
        @keyframes countPop { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1); } }
        .flash-active { animation: flashRun 0.6s ease-out; }
        @keyframes flashRun { 0% { opacity: 1; } 100% { opacity: 0; } }

        .f-bw { filter: grayscale(1); }
        .f-vintage { filter: sepia(0.6) contrast(1.1); }
        .f-cool { filter: hue-rotate(180deg) brightness(1.1); }
        .f-warm { filter: sepia(0.2) saturate(1.6); }
    </style>
</head>
<body>

<div class="glass-shell" id="app-shell">
    <div class="preview-panel">
        <video id="v-preview" autoplay playsinline muted class="mirrored"></video>
        <div id="count-num">3</div>
        <div id="flash-fx" class="flash-fx"></div>
    </div>

    <div class="side-panel">
        <div>
            <h1>PROBOOTH</h1>
            <p class="subtitle">Premium Digital buratt</p>
        </div>

        <div class="grid-2">
            <button id="btn-power" class="btn btn-secondary">
                <svg class="icon" viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
                Camera
            </button>
            <button id="btn-mirror" class="btn btn-secondary">
                <svg class="icon" viewBox="0 0 24 24"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/></svg>
                Mirror
            </button>
        </div>

        <div class="control-group">
            <label>Layout Style</label>
            <select id="mode-select">
                <option value="1">Solo Masterpiece</option>
                <option value="strip">Classic 3-Photo Strip</option>
                <option value="grid">2x2 Modern Grid</option>
            </select>
        </div>

        <div class="grid-2">
            <div class="control-group">
                <label>Timer</label>
                <select id="timer-select">
                    <option value="3">3s</option>
                    <option value="5">5s</option>
                    <option value="10">10s</option>
                </select>
            </div>
            <div class="control-group">
                <label>Vibe</label>
                <select id="filter-select">
                    <option value="none">Natural</option>
                    <option value="f-bw">Noir</option>
                    <option value="f-vintage">Ethereal</option>
                    <option value="f-cool">Arctic</option>
                    <option value="f-warm">Sunset</option>
                </select>
            </div>
        </div>

        <div class="control-group">
            <label>Custom Caption</label>
            <input type="text" id="caption-input" placeholder="Type a memory...">
        </div>

        <div class="control-group">
            <label>Frame Finish</label>
            <input type="color" id="color-input" value="#ffffff" style="width: 100%; height: 40px; padding: 5px;">
        </div>

        <button id="btn-capture" class="btn btn-primary capture-btn" disabled>
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
            Start Session
        </button>
    </div>
</div>

<div id="result-view">
    <div class="sticker-panel">
        <span class="sticker-opt" onclick="addSticker('🩷')">🩷</span>
        <span class="sticker-opt" onclick="addSticker('💕')">💕</span>
        <span class="sticker-opt" onclick="addSticker('🤭')">🤭</span>
        <span class="sticker-opt" onclick="addSticker('😎')">😎</span>
        <span class="sticker-opt" onclick="addSticker('🌺')">🌺</span>
        <span class="sticker-opt" onclick="addSticker('🌷')">🌷</span>
        <span class="sticker-opt" onclick="addSticker('👑')">👑</span>
        <span class="sticker-opt" onclick="addSticker('🎱')">🎱</span>
        <span class="sticker-opt" onclick="addSticker('😧')">😧</span>
    </div>

    <div class="canvas-container" id="canvas-wrap">
        <canvas id="final-canvas"></canvas>
    </div>

    <div class="grid-2" style="width: 100%; max-width: 500px;">
        <button id="btn-download" class="btn btn-primary">Save Final Image</button>
        <button id="btn-retake" class="btn btn-secondary">Retake</button>
    </div>
</div>

<script>
    const state = {
        stream: null,
        isMirrored: true,
        capturedFrames: [],
        stickers: []
    };

    const els = {
        video: document.getElementById('v-preview'),
        powerBtn: document.getElementById('btn-power'),
        captureBtn: document.getElementById('btn-capture'),
        mirrorBtn: document.getElementById('btn-mirror'),
        filter: document.getElementById('filter-select'),
        count: document.getElementById('count-num'),
        flash: document.getElementById('flash-fx'),
        result: document.getElementById('result-view'),
        canvas: document.getElementById('final-canvas'),
        canvasWrap: document.getElementById('canvas-wrap'),
        download: document.getElementById('btn-download'),
        retake: document.getElementById('btn-retake')
    };

    // --- Audio ---
    const playSound = () => {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    };

    async function toggleCamera() {
        if (state.stream) {
            state.stream.getTracks().forEach(t => t.stop());
            state.stream = null;
            els.video.srcObject = null;
            els.captureBtn.disabled = true;
        } else {
            try {
                state.stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: {ideal: 1280}, height: {ideal: 720} },
                    audio: false
                });
                els.video.srcObject = state.stream;
                els.captureBtn.disabled = false;
            } catch (err) { alert("Camera error: " + err.message); }
        }
    }

    async function startSession() {
        const mode = document.getElementById('mode-select').value;
        const total = mode === '1' ? 1 : (mode === 'strip' ? 3 : 4);
        const timer = parseInt(document.getElementById('timer-select').value);
        state.capturedFrames = [];
        els.captureBtn.disabled = true;

        for(let i = 0; i < total; i++) {
            await countdown(timer);
            captureFrame();
            if(i < total - 1) await new Promise(r => setTimeout(r, 800));
        }
        renderComposition();
    }

    function countdown(sec) {
        return new Promise(resolve => {
            let current = sec;
            els.count.innerText = current;
            els.count.classList.add('count-animate');
            const interval = setInterval(() => {
                current--;
                if(current <= 0) {
                    clearInterval(interval);
                    els.count.classList.remove('count-animate');
                    resolve();
                } else {
                    els.count.innerText = current;
                    els.count.classList.remove('count-animate');
                    void els.count.offsetWidth;
                    els.count.classList.add('count-animate');
                }
            }, 1000);
        });
    }

    function captureFrame() {
        els.flash.classList.add('flash-active');
        setTimeout(() => els.flash.classList.remove('flash-active'), 600);
        playSound();

        const buffer = document.createElement('canvas');
        buffer.width = els.video.videoWidth;
        buffer.height = els.video.videoHeight;
        const ctx = buffer.getContext('2d');

        if(state.isMirrored) {
            ctx.translate(buffer.width, 0); ctx.scale(-1, 1);
        }

        const f = els.filter.value;
        if(f === 'f-bw') ctx.filter = 'grayscale(1)';
        if(f === 'f-vintage') ctx.filter = 'sepia(0.6) contrast(1.1)';
        if(f === 'f-cool') ctx.filter = 'hue-rotate(180deg) brightness(1.1)';
        if(f === 'f-warm') ctx.filter = 'sepia(0.2) saturate(1.6)';

        ctx.drawImage(els.video, 0, 0);
        state.capturedFrames.push(buffer.toDataURL('image/png'));
    }

    // --- High Quality Aspect-Ratio Composition ---
    function renderComposition() {
        const mode = document.getElementById('mode-select').value;
        const ctx = els.canvas.getContext('2d');
        const frameColor = document.getElementById('color-input').value;
        const caption = document.getElementById('caption-input').value || "PROBOOTH";

        // Setup dimensions based on input video aspect ratio
        const vW = els.video.videoWidth;
        const vH = els.video.videoHeight;
        const ratio = vW / vH;
        
        const targetW = 1000;
        const targetH = targetW / ratio; // Maintain Aspect Ratio
        const pad = 50;
        const footer = 120;

        if(mode === '1') {
            els.canvas.width = targetW + (pad * 2);
            els.canvas.height = targetH + pad + footer;
        } else if(mode === 'strip') {
            els.canvas.width = targetW + (pad * 2);
            els.canvas.height = (targetH * 3) + (pad * 4) + footer;
        } else {
            els.canvas.width = (targetW * 2) + (pad * 3);
            els.canvas.height = (targetH * 2) + (pad * 3) + footer;
        }

        ctx.fillStyle = frameColor;
        ctx.fillRect(0, 0, els.canvas.width, els.canvas.height);

        let loaded = 0;
        state.capturedFrames.forEach((src, i) => {
            const img = new Image();
            img.onload = () => {
                let x, y;
                if(mode === '1') { x = pad; y = pad; }
                else if(mode === 'strip') { x = pad; y = pad + (i * (targetH + pad)); }
                else {
                    x = pad + (i % 2 * (targetW + pad));
                    y = pad + (Math.floor(i / 2) * (targetH + pad));
                }
                ctx.drawImage(img, x, y, targetW, targetH);
                loaded++;
                if(loaded === state.capturedFrames.length) finalizeCanvas(ctx, frameColor, caption);
            };
            img.src = src;
        });
    }

    function finalizeCanvas(ctx, color, text) {
        const w = els.canvas.width;
        const h = els.canvas.height;
        const date = new Date().toLocaleDateString();
        
        const r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
        ctx.fillStyle = (r*0.299 + g*0.587 + b*0.114) > 186 ? '#1e293b' : '#f8fafc';

        ctx.textAlign = 'center';
        ctx.font = 'bold 40px Inter, sans-serif';
        ctx.fillText(text.toUpperCase(), w/2, h - 70);
        ctx.font = '24px Inter, sans-serif';
        ctx.globalAlpha = 0.6;
        ctx.fillText(date, w/2, h - 35);
        ctx.globalAlpha = 1;
        
        els.result.style.display = 'flex';
        // Clear previous stickers if any
        document.querySelectorAll('.active-sticker').forEach(s => s.remove());
    }

    // --- Sticker System ---
    function addSticker(emoji) {
        const sticker = document.createElement('div');
        sticker.className = 'active-sticker';
        sticker.innerText = emoji;
        sticker.style.left = '50%';
        sticker.style.top = '50%';
        
        // Dragging Logic
        let isDragging = false;
        let startX, startY;

        const moveSticker = (e) => {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const rect = els.canvasWrap.getBoundingClientRect();
            let x = clientX - rect.left;
            let y = clientY - rect.top;
            
            sticker.style.left = `${x}px`;
            sticker.style.top = `${y}px`;
            sticker.style.transform = 'translate(-50%, -50%)';
        };

        sticker.onmousedown = (e) => { isDragging = true; };
        sticker.ontouchstart = (e) => { isDragging = true; };
        
        window.addEventListener('mousemove', moveSticker);
        window.addEventListener('touchmove', moveSticker);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);

        // Resize on Double Click
        sticker.ondblclick = () => {
            let size = parseInt(window.getComputedStyle(sticker).fontSize);
            sticker.style.fontSize = (size > 150 ? 60 : size + 30) + 'px';
        };

        els.canvasWrap.appendChild(sticker);
    }

    async function downloadFinal() {
        // Draw stickers onto canvas before download
        const ctx = els.canvas.getContext('2d');
        const stickers = document.querySelectorAll('.active-sticker');
        const rect = els.canvasWrap.getBoundingClientRect();
        const scaleX = els.canvas.width / rect.width;
        const scaleY = els.canvas.height / rect.height;

        stickers.forEach(s => {
            const style = window.getComputedStyle(s);
            const fontSize = parseFloat(style.fontSize) * scaleX;
            ctx.font = `${fontSize}px serif`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            
            const left = parseFloat(s.style.left) * scaleX;
            const top = parseFloat(s.style.top) * scaleY;
            
            ctx.fillText(s.innerText, left, top);
        });

        const link = document.createElement('a');
        link.download = `ProBooth_${Date.now()}.png`;
        link.href = els.canvas.toDataURL('image/png', 1.0);
        link.click();
        
        
        renderComposition(); 
    }
    els.powerBtn.onclick = toggleCamera;
    els.mirrorBtn.onclick = () => {
        state.isMirrored = !state.isMirrored;
        els.video.classList.toggle('mirrored', state.isMirrored);
    };
    els.filter.onchange = () => {
        els.video.className = state.isMirrored ? 'mirrored ' + els.filter.value : els.filter.value;
    };
    els.captureBtn.onclick = startSession;
    els.retake.onclick = () => {
        els.result.style.display = 'none';
        els.captureBtn.disabled = false;
    };
    els.download.onclick = downloadFinal;
</script>
</body>
</html>
